name: Build Release Artifacts

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

# Required for the release-publish step (softprops/action-gh-release).
permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # libloot must be built once per target Python ABI:
  #   - Arch container (AppImage): Python 3.14 → cp314 .so
  #   - GNOME 49 runtime (Flatpak): Python 3.13 → cp313 .so
  # Each is cached independently keyed on libloot HEAD + Python version.
  # ────────────────────────────────────────────────────────────────────
  libloot-arch:
    name: libloot (Arch / cp314)
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    outputs:
      so-name: ${{ steps.detect.outputs.so-name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syy --noconfirm
          pacman -S --noconfirm \
              python python-pip base-devel rust git unzip

      - name: Resolve libloot revision and Python ABI
        id: detect
        run: |
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV"  >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"            >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"          >> "$GITHUB_OUTPUT"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - uses: actions/upload-artifact@v4
        with:
          name: libloot-cp314
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  # libloot for Python 3.13 — needed by the Flatpak (GNOME 49 runtime
  # ships Python 3.13). Built on a plain Ubuntu runner with
  # actions/setup-python because the Flathub container has no usable
  # package manager and the Arch container ships Python 3.14.
  libloot-gnome:
    name: libloot (GNOME 49 / cp313)
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Resolve libloot revision
        id: detect
        run: |
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV" >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"           >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"         >> "$GITHUB_OUTPUT"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - uses: actions/upload-artifact@v4
        with:
          name: libloot-cp313
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────
  # AppImage build — runs for every tag (stable and prerelease).
  # ────────────────────────────────────────────────────────────────────
  appimage:
    name: AppImage
    needs: libloot-arch
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare anylinux container
        uses: pkgforge-dev/anylinux-setup-action@v2

      - name: Install build dependencies
        run: |
          # gtk3: explicit because python-gobject doesn't require it
          # directly; quick-sharun's DEPLOY_GTK=1 needs it on disk to bundle.
          # python-gobject + python-cairo: GTK splash screen — without
          # cairo the splash subprocess silently exits 1.
          # tk: tkinter import inside the bundled Python.
          # libarchive: bsdtar + libarchive.so.13 for fast extraction.
          # sudo: needed for `sudo -u builder` makepkg invocation.
          # (base-devel is already pulled in by anylinux-setup-action.)
          # zenity is bundled from zenity-rs-bin (static, GTK-free) by the
          # PKGBUILD; not installed here so we don't pull GTK4 alongside
          # our bundled GTK3.
          pacman -Syu --noconfirm \
              gtk3 \
              python-gobject \
              python-cairo \
              python-pip \
              tk \
              libarchive \
              wget \
              sudo

      - name: Install debloated GTK / icu / libxml2 stack
        run: |
          get-debloated-pkgs \
              gtk3-mini \
              gdk-pixbuf2-mini \
              librsvg-mini \
              icu-mini \
              libxml2-mini

      - name: Create makepkg build user
        run: |
          # makepkg refuses to run as root. The container is root by
          # default, so create a user the script can sudo to.
          if ! id builder >/dev/null 2>&1; then
              useradd -m -G wheel builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
              chmod 0440 /etc/sudoers.d/builder
          fi

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-cp314
          path: src/LOOT/

      - name: Build AppImage
        env:
          ANYLINUX_LIB: '1'
          MM_USE_PKGBUILD: '1'
        run: bash src/appimage/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: src/appimage/dist/*.AppImage
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────
  # Flatpak bundle — only built for stable releases (no hyphen in tag).
  # Pulls the cp313 libloot from libloot-gnome, drops it into src/LOOT/
  # so the manifest's `cp -a src/LOOT` step picks it up.
  # ────────────────────────────────────────────────────────────────────
  flatpak:
    name: Flatpak
    if: ${{ !contains(github.ref_name, '-') }}
    needs: libloot-gnome
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-cp313
          path: src/LOOT/

      - name: Build Flatpak bundle
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: AmethystModManager.flatpak
          manifest-path: flatpak/io.github.Amethyst.ModManager.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-flatpak
          path: AmethystModManager.flatpak
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────
  # Publish a GitHub Release with the AppImage (always) and Flatpak
  # bundle (stable only). Runs only on tag pushes — workflow_dispatch
  # runs still upload artifacts to the run page but skip this job.
  # ────────────────────────────────────────────────────────────────────
  release:
    name: Publish Release
    if: |
      always()
      && startsWith(github.ref, 'refs/tags/v')
      && needs.appimage.result == 'success'
      && (needs.flatpak.result == 'success' || needs.flatpak.result == 'skipped')
    needs: [appimage, flatpak]
    runs-on: ubuntu-latest
    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: artifacts/
      - name: Download Flatpak (stable only)
        if: ${{ !contains(github.ref_name, '-') }}
        uses: actions/download-artifact@v4
        with:
          name: AmethystModManager-flatpak
          path: artifacts/

      # When publishing a new beta, remove older prereleases (and their
      # tags) so only the latest beta is visible on the releases page.
      # Each beta keeps its own unique tag at publish time — the auto
      # updater only needs the new tag to exist.
      - name: Delete previous beta releases
        if: contains(github.ref_name, '-')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 50 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease) | select(.tagName != "${{ github.ref_name }}") | .tagName' \
          | while read -r tag; do
              echo "Deleting prerelease $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag
            done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
