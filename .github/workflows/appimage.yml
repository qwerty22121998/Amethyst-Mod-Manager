name: Build AppImage

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

# Required for the release-publish step (softprops/action-gh-release).
# Default GITHUB_TOKEN is read-only; this elevates it to write releases.
permissions:
  contents: write

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Build the libloot Python extension. Split out so it can be cached
  # independently — the Rust compile is ~80s and only needs to re-run
  # when libloot's master HEAD or the host Python ABI changes.
  # ────────────────────────────────────────────────────────────────────
  libloot:
    name: Build libloot extension
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    outputs:
      so-name: ${{ steps.detect.outputs.so-name }}
      libloot-rev: ${{ steps.detect.outputs.libloot-rev }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syy --noconfirm
          pacman -S --noconfirm \
              python python-pip base-devel rust git unzip

      - name: Resolve libloot revision and Python ABI
        id: detect
        run: |
          # Latest libloot master commit — used as a cache key so that
          # bumps to libloot trigger a rebuild but unrelated re-runs hit
          # the cache.
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV"  >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"            >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"          >> "$GITHUB_OUTPUT"
          echo "libloot=$LIBLOOT_REV  py=$PY_TAG  so=$SO_NAME"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - name: Upload extension as job artifact
        uses: actions/upload-artifact@v4
        with:
          name: libloot-extension
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────
  # Build the AppImage. Pulls the precompiled libloot .so from the
  # previous job rather than rebuilding it.
  # ────────────────────────────────────────────────────────────────────
  appimage:
    name: Build AppImage
    needs: libloot
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare anylinux container
        uses: pkgforge-dev/anylinux-setup-action@v2

      - name: Install build dependencies
        run: |
          # gtk3: explicit because python-gobject doesn't require it
          # directly; quick-sharun's DEPLOY_GTK=1 needs it on disk to bundle.
          # python-gobject + python-cairo: GTK splash screen — without
          # cairo the splash subprocess silently exits 1.
          # tk: tkinter import inside the bundled Python.
          # libarchive: bsdtar + libarchive.so.13 for fast extraction.
          # sudo: needed for `sudo -u builder` makepkg invocation.
          # (base-devel is already pulled in by anylinux-setup-action.)
          # zenity is bundled from zenity-rs-bin (static, GTK-free) by
          # make-appimage.sh; not installed here so we don't pull GTK4
          # alongside our bundled GTK3.
          pacman -Syu --noconfirm \
              gtk3 \
              python-gobject \
              python-cairo \
              python-pip \
              tk \
              libarchive \
              wget \
              sudo

      - name: Install debloated GTK / icu / libxml2 stack
        run: |
          # Replace the standard packages with pkgforge-dev's slimmed-down
          # variants. These strip features we don't use (X-server-only deps,
          # locale data we don't ship, doc/man pages, debug symbols) and
          # noticeably shrink the final AppImage. We don't ask for mesa or
          # vulkan — ALWAYS_SOFTWARE=1 means we never load GPU drivers.
          get-debloated-pkgs \
              gtk3-mini \
              gdk-pixbuf2-mini \
              librsvg-mini \
              icu-mini \
              libxml2-mini

      - name: Create makepkg build user
        run: |
          # makepkg refuses to run as root. The container is root by
          # default, so create a user the script can sudo to.
          if ! id builder >/dev/null 2>&1; then
              useradd -m -G wheel builder
              echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
              chmod 0440 /etc/sudoers.d/builder
          fi

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-extension
          path: src/LOOT/

      - name: Build AppImage
        env:
          ANYLINUX_LIB: '1'
          MM_USE_PKGBUILD: '1'
        run: bash src/appimage/make-appimage.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: src/appimage/dist/*.AppImage
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: src/appimage/dist/*.AppImage
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
