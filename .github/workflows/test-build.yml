name: Test Build

# Smoke-test that AppImage and Flatpak still build cleanly. Does NOT
# publish anything — no release, no flathub submission. Artifacts are
# kept for 7 days so you can download and test them.
#
# Mirrors the structure of release.yml but without the publish step.

on:
  push:
    branches: [Testing, main, Dev]
    paths:
      - 'src/**'
      - 'flatpak/**'
      - 'Changelog.txt'
      - '.github/workflows/test-build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'flatpak/**'
  workflow_dispatch: {}

jobs:
  # ────────────────────────────────────────────────────────────────────
  # libloot — same caching strategy as release.yml. Both ABIs always
  # built here since this workflow tests both AppImage and Flatpak.
  # ────────────────────────────────────────────────────────────────────
  libloot-arch:
    name: libloot (Arch / cp314)
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syy --noconfirm
          pacman -S --noconfirm \
              python python-pip base-devel rust git unzip

      - name: Resolve libloot revision and Python ABI
        id: detect
        run: |
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV"  >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"            >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"          >> "$GITHUB_OUTPUT"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - uses: actions/upload-artifact@v4
        with:
          name: libloot-cp314
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  libloot-gnome:
    name: libloot (GNOME 49 / cp313)
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y --setopt=install_weak_deps=False \
              gcc gcc-c++ make unzip cargo rust
          rustc --version
          python3 --version

      - name: Resolve libloot revision and Python ABI
        id: detect
        run: |
          LIBLOOT_REV=$(git ls-remote https://github.com/loot/libloot.git HEAD | awk '{print substr($1,1,12)}')
          PY_TAG=$(python3 -c 'import sys; print(f"cp{sys.version_info.major}{sys.version_info.minor}")')
          SO_NAME="loot.cpython-${PY_TAG#cp}-x86_64-linux-gnu.so"
          echo "libloot-rev=$LIBLOOT_REV"  >> "$GITHUB_OUTPUT"
          echo "py-tag=$PY_TAG"            >> "$GITHUB_OUTPUT"
          echo "so-name=$SO_NAME"          >> "$GITHUB_OUTPUT"

      - name: Cache built extension
        id: cache
        uses: actions/cache@v4
        with:
          path: src/LOOT/${{ steps.detect.outputs.so-name }}
          key: libloot-${{ steps.detect.outputs.libloot-rev }}-${{ steps.detect.outputs.py-tag }}

      - name: Build extension
        if: steps.cache.outputs.cache-hit != 'true'
        run: bash src/LOOT/rebuild_libloot.sh

      - uses: actions/upload-artifact@v4
        with:
          name: libloot-cp313
          path: src/LOOT/loot.cpython-*-x86_64-linux-gnu.so
          if-no-files-found: error
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────
  # AppImage smoke test
  # ────────────────────────────────────────────────────────────────────
  appimage:
    name: AppImage
    needs: libloot-arch
    runs-on: ubuntu-latest
    container: ghcr.io/pkgforge-dev/archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare anylinux container
        uses: pkgforge-dev/anylinux-setup-action@v2

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm \
              python-gobject \
              python-cairo \
              python-pip \
              tk \
              zenity \
              libarchive \
              wget

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-cp314
          path: src/LOOT/

      - name: Build AppImage
        env:
          ANYLINUX_LIB: '1'
        run: bash src/appimage/make-appimage.sh

      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-AppImage
          path: src/appimage/dist/*.AppImage
          if-no-files-found: error
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────
  # Flatpak smoke test
  # ────────────────────────────────────────────────────────────────────
  flatpak:
    name: Flatpak
    needs: libloot-gnome
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Download libloot extension
        uses: actions/download-artifact@v4
        with:
          name: libloot-cp313
          path: src/LOOT/

      - name: Build Flatpak bundle
        uses: flathub-infra/flatpak-github-actions/flatpak-builder@master
        with:
          bundle: AmethystModManager.flatpak
          manifest-path: flatpak/io.github.Amethyst.ModManager.yml
          cache-key: flatpak-builder-${{ github.sha }}
          upload-artifact: false

      - uses: actions/upload-artifact@v4
        with:
          name: AmethystModManager-flatpak
          path: AmethystModManager.flatpak
          if-no-files-found: error
          retention-days: 7
