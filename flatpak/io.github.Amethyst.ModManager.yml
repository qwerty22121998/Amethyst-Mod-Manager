app-id: io.github.Amethyst.ModManager
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk

# 32-bit support for running Proton's bundled `wine` binary (ELF i386) during
# Synthesis prefix setup. Without these, exec'ing wine fails with ENOENT — the
# kernel reports the missing 32-bit ld-linux.so.2 interpreter as the error.
add-extensions:
  org.freedesktop.Platform.Compat.i386:
    directory: lib/i386-linux-gnu
    version: '25.08'
  org.freedesktop.Platform.GL32:
    directory: lib/i386-linux-gnu/GL
    version: '1.4'
    versions: 25.08;1.4
    subdirectories: true
    no-autodownload: false
    autodelete: false
    add-ld-path: lib

command: amethyst-mod-manager

# Sandbox permissions
# - network: Nexus API send/receive, version checks, downloads
# - x11 (+ wayland socket): Tkinter uses X11 only; on Wayland it needs XWayland, so we use
#   socket=x11 (not fallback-x11 — fallback withholds X11 when Wayland is the session).
# - dri: GPU rendering
# - home: mod staging (user-configurable path, e.g. anywhere in ~/), game paths, Steam libraries, config (~/.config/AmethystModManager)
# - run/media, media, mnt: Steam libraries on SD cards and removable drives (Steam Deck, etc.)
# - ~/.var/app/com.valvesoftware.Steam: Steam Flatpak data (home excludes ~/.var/app)
# - ~/.var/app/com.heroicgameslauncher.hgl: Heroic Flatpak
# - talk-name=org.freedesktop.secrets: keyring (Nexus API key storage and retrieval)
finish-args:
  - --share=network
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --filesystem=home
  - --filesystem=/run/media
  - --filesystem=/media
  - --filesystem=/mnt
  - --filesystem=~/.var/app/com.valvesoftware.Steam
  - --filesystem=~/.var/app/com.heroicgameslauncher.hgl
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Flatpak
  # Wine (Synthesis prefix setup) installs its own seccomp filter and runs
  # 32-bit binaries; the default sandbox blocks both, killing wine with SIGSYS.
  - --allow=multiarch

tags:
  - modmanager
  - games
  - modding

cleanup-commands:
  # Mount points for the 32-bit compat extensions declared above.
  - mkdir -p /app/lib/i386-linux-gnu/GL

modules:
  # Tkinter
  - python3-tkinter.yaml
  # Python Dependencies
  - pypi-dependencies.yaml

  - name: sevenzip
    buildsystem: simple
    build-commands:
      - make -C CPP/7zip/Bundles/Alone2 -f makefile.gcc
      - install -Dm755 CPP/7zip/Bundles/Alone2/_o/7zz /app/bin/7zz
    sources:
      - type: archive
        url: https://www.7-zip.org/a/7z2501-src.tar.xz
        sha256: ed087f83ee789c1ea5f39c464c55a5c9d4008deb0efe900814f2df262b82c36e
        strip-components: 0
  - name: unrar
    buildsystem: simple
    build-commands:
      - make -f makefile
      - install -Dm755 unrar /app/bin/unrar
    sources:
      - type: archive
        url: https://www.rarlab.com/rar/unrarsrc-7.1.9.tar.gz
        sha256: cbb5c7b65b720e59ffa47b2d00b8d1022a961da7ae1db27b6986c43671719483

  - name: amethyst-mod-manager
    buildsystem: simple
    build-commands:
      - install -d /app/share/amethyst-mod-manager
      - cp -a src/gui.py src/cli.py src/version.py src/splash_gtk.py src/gui src/Utils src/Games src/LOOT src/Nexus src/icons src/wizards src/wrappers src/gpak /app/share/amethyst-mod-manager/
      - cp Changelog.txt /app/share/amethyst-mod-manager/

      - install -d /app/bin
      - |
        printf '%s\n' '#!/bin/sh' \
          'export MOD_MANAGER_GAMES="/app/share/amethyst-mod-manager/Games"' \
          'export XDG_DATA_DIRS=/app/share:/usr/share' \
          'cd /app/share/amethyst-mod-manager' \
          'exec python3 gui.py "$@"' > /app/bin/amethyst-mod-manager
      - chmod +x /app/bin/amethyst-mod-manager
      - |
        printf '%s\n' '#!/bin/sh' \
          'export MOD_MANAGER_GAMES="/app/share/amethyst-mod-manager/Games"' \
          'export XDG_DATA_DIRS=/app/share:/usr/share' \
          'cd /app/share/amethyst-mod-manager' \
          'exec python3 cli.py "$@"' > /app/bin/amethyst-mod-manager-cli
      - chmod +x /app/bin/amethyst-mod-manager-cli
      - install -d /app/share/applications
      - install -m 644 flatpak/io.github.Amethyst.ModManager.desktop /app/share/applications/
      - install -d /app/share/icons/hicolor/64x64/apps /app/share/icons/hicolor/128x128/apps /app/share/icons/hicolor/256x256/apps
      - install -m 644 src/appimage/mod-manager.png /app/share/icons/hicolor/64x64/apps/io.github.Amethyst.ModManager.png
      - install -m 644 src/appimage/mod-manager.png /app/share/icons/hicolor/128x128/apps/io.github.Amethyst.ModManager.png
      - install -m 644 src/appimage/mod-manager.png /app/share/icons/hicolor/256x256/apps/io.github.Amethyst.ModManager.png
    sources:
      - type: dir
        path: ..
